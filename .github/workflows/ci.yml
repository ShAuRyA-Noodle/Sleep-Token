name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio

      - name: Run core tests
        run: pytest tests/ -q --tb=short

      - name: RL smoke test (import check)
        run: |
          pip install gymnasium==0.29.1 torch --index-url https://download.pytorch.org/whl/cpu
          python -c "
          import gymnasium as gym
          import rl
          env = gym.make('SupplyMind-Easy-v1')
          obs, info = env.reset(seed=42)
          assert obs.shape == (408,)
          assert info['action_masks'].shape == (280,)
          obs2, r, term, trunc, info2 = env.step(env.action_space.sample())
          assert obs2.shape == (408,)
          print('RL smoke test passed!')
          env.close()
          "

      - name: API smoke test
        run: |
          python -c "
          from server.app import app
          from fastapi.testclient import TestClient
          client = TestClient(app)
          r = client.get('/health')
          assert r.status_code == 200
          print('API smoke test passed!')
          "
